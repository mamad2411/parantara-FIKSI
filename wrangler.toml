# Cloudflare Pages Configuration for DanaMasjid
# Next.js 16 with Maximum Security

name = "danamasjid"
compatibility_date = "2024-01-01"
pages_build_output_dir = ".vercel/output/static"

[env.production]
name = "danamasjid"
routes = [
  { pattern = "danamasjid.pages.dev", custom_domain = true }
]

# Security: Rate Limiting
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "danamasjid_rate_limit"
simple = { limit = 100, period = 60 }

# Security: KV for session storage
[[kv_namespaces]]
binding = "SESSIONS"
id = "preview_id"
preview_id = "preview_id"

# Environment Variables (set via dashboard or CLI)
[vars]
ENVIRONMENT = "production"
