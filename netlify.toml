[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  NODE_ENV = "production"

# Next.js plugin for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers for static assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"

# API proxy to Cloudflare Workers
[[redirects]]
  from = "/api/*"
  to = "https://danamasjid-api.danamsjid-api.workers.dev/:splat"
  status = 200
  force = true

# Force HTTPS
[[redirects]]
  from = "http://danamasjid.netlify.app/*"
  to = "https://danamasjid.netlify.app/:splat"
  status = 301
  force = true
