[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"
  NODE_ENV = "production"

# Next.js plugin for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Edge function to fix CSS MIME type
[[edge_functions]]
  function = "fix-css-mime"
  path = "/_next/static/*"

# API proxy to Cloudflare Workers
[[redirects]]
  from = "/api/*"
  to = "https://danamasjid-api.danamsjid-api.workers.dev/:splat"
  status = 200
  force = true

# Force HTTPS
[[redirects]]
  from = "http://danamasjid.netlify.app/*"
  to = "https://danamasjid.netlify.app/:splat"
  status = 301
  force = true
