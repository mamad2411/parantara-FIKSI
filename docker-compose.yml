services:
  postgres:
    image: postgres:15-alpine
    container_name: danamasjid-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: danamasjid
      POSTGRES_PASSWORD: danamasjid_secure_password
      POSTGRES_DB: danamasjid
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/src/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - danamasjid-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: danamasjid-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://danamasjid:danamasjid_secure_password@postgres:5432/danamasjid
      JWT_SECRET: 448c4da52de0323a95dd440c3ad5c8b6ea491675769477b7431a0005c706be3f
      JWT_EXPIRES_IN: 7d
      # SMTP Configuration
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: danamasjid48@gmail.com
      SMTP_PASS: qkuhfmkxkuidrpdk
      SMTP_FROM: danamasjid48@gmail.com
      # Firebase Configuration
      FIREBASE_API_KEY: AIzaSyBny76tC-JI2EH42o4ib2Gy0dfFTN5WYFw
      FIREBASE_AUTH_DOMAIN: danamasjid.firebaseapp.com
      FIREBASE_PROJECT_ID: danamasjid
      FIREBASE_STORAGE_BUCKET: danamasjid.firebasestorage.app
      FIREBASE_MESSAGING_SENDER_ID: 392583750035
      FIREBASE_APP_ID: 1:392583750035:web:46a42d528d01fcac5f4866
      FIREBASE_MEASUREMENT_ID: G-9L1LHKQM2F
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - danamasjid-network

volumes:
  postgres_data:

networks:
  danamasjid-network:
    driver: bridge
